<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="./signup.css">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
</head>

<body>
    <div class="signup_container">
        <h1>Create Account</h1>
        <form action="/api/signup" method="post">
            <input type="hidden" name="_csrf" id="signup-csrf-token">
            <label for="signup-username" class="sr-only">Username</label>
            <input type="text" id="signup-username" name="username" placeholder="Enter Username.." required>
            <label for="signup-email" class="sr-only">Email</label>
            <input type="email" id="signup-email" name="email" placeholder="Enter Email.." required>
            <label for="signup-password" class="sr-only">Password</label>
            <input type="password" id="signup-password" name="password" placeholder="Enter Password.." required>
            <label for="signup-confirm-password" class="sr-only">Confirm Password</label>
            <input type="password" id="signup-confirm-password" name="confirmpassword" placeholder="Confirm Password.." required>
            <span id="pw-error" style="color:red; font-size:small;"></span>
            <button type="submit">Sign Up</button>
        </form>
    </div>
    <script type="module">
        const password = document.querySelector('input[name="password"]');
        const confirm = document.querySelector('input[name="confirmpassword"]');
        const csrfInput = document.getElementById('signup-csrf-token');

        try {
            const response = await fetch('/api/csrf');
            const tokenData = await response.json();

            if (csrfInput) {
                csrfInput.value = tokenData.token;
            }
        } catch {
            if (csrfInput) {
                csrfInput.value = '';
            }
        }

        confirm.addEventListener("input", () => {
            const error = document.getElementById("pw-error");
            if (confirm.value && password.value !== confirm.value) {
                error.textContent = "Passwords do not match.";
                confirm.setCustomValidity("Passwords do not match.");
            } else {
                error.textContent = "";
                confirm.setCustomValidity("");
            }
        });
    </script>
</body>
</html>
